name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-main
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

  prerelease:
    name: Build And Publish Prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Read version metadata
        id: meta
        shell: pwsh
        run: |
          $version = python -c "from iconfix import __version__; print(__version__)"
          $sha = "${env:GITHUB_SHA}".Substring(0, 7)
          $tag = "preview"
          $title = "IconFix Preview v$version ($sha)"
          $zip = "IconFix-preview-windows-x64.zip"

          "version=$version" >> $env:GITHUB_OUTPUT
          "short_sha=$sha" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=$title" >> $env:GITHUB_OUTPUT
          "zip_name=$zip" >> $env:GITHUB_OUTPUT

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name IconFix IconFix.py

      - name: Prepare release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/IconFix.exe release/
          Copy-Item IconFix.ps1 release/
          Copy-Item README.md release/
          if (Test-Path docs/optimization-notes-v2.0.md) {
            Copy-Item docs/optimization-notes-v2.0.md release/
          }
          Compress-Archive -Path release/* -DestinationPath "${{ steps.meta.outputs.zip_name }}" -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: IconFix-${{ steps.meta.outputs.tag }}
          path: |
            dist/IconFix.exe
            IconFix.ps1
            ${{ steps.meta.outputs.zip_name }}

      - name: Remove existing GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --cleanup-tag --yes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            git push origin ":refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          $legacyPattern = '^v\d+\.\d+\.\d+-pre\.'
          $releaseList = gh release list --limit 100 --json tagName,isPrerelease
          if ($LASTEXITCODE -eq 0 -and $releaseList) {
            $releases = $releaseList | ConvertFrom-Json
            foreach ($release in $releases) {
              if ($release.isPrerelease -and $release.tagName -match $legacyPattern) {
                gh release delete $release.tagName --cleanup-tag --yes
                if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
                }
              }
            }
          }

          exit 0

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" `
            "dist/IconFix.exe" `
            "IconFix.ps1" `
            "${{ steps.meta.outputs.zip_name }}" `
            --title "${{ steps.meta.outputs.title }}" `
            --prerelease `
            --latest=false `
            --generate-notes `
            --notes "Automated preview from main branch. Version: ${{ steps.meta.outputs.version }}. Commit: ${{ steps.meta.outputs.short_sha }}." `
            --target "${{ github.sha }}"
